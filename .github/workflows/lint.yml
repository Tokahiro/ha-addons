name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: "-s bash -S warning -o all"
        with:
          scandir: "./grimmory"
          additional_files: >-
            grimmory/rootfs/usr/local/lib/grimmory/log.sh
            grimmory/rootfs/usr/local/lib/grimmory/options.sh
            grimmory/rootfs/usr/local/lib/grimmory/paths.sh
            grimmory/rootfs/usr/local/lib/grimmory/mounts.sh
            grimmory/rootfs/usr/local/lib/grimmory/database.sh
